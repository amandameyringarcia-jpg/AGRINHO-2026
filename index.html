<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agronomia Sustentável</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav>
      <button id="botao-menu" aria-expanded="false" aria-label="Abrir menu">☰</button>
      <ul id="menu-navegacao">
        <li><a href="#praticas">Práticas</a></li>
        <li><a href="#clima">Clima</a></li>
        <li><a href="#calculadora">Calculadora</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="praticas">
      <h2>Práticas Sustentáveis</h2>

      <input type="search" id="campo-busca" placeholder="Buscar prática..." />

      <div class="filtros">
        <button class="botao-filtro botao-filtro--ativo" data-categoria="todas">Todas</button>
        <button class="botao-filtro" data-categoria="solo">Solo</button>
        <button class="botao-filtro" data-categoria="agua">Água</button>
        <button class="botao-filtro" data-categoria="biodiversidade">Biodiversidade</button>
      </div>

      <div id="lista-praticas"></div>
    </section>

    <section id="clima">
      <h2>Clima Atual</h2>
      <div id="widget-clima">Carregando dados climáticos...</div>
    </section>

    <section id="calculadora">
      <h2>Calculadora de Consumo Hídrico</h2>
      <form id="form-calculadora-hidrica">
        <label>
          Área (hectares):
          <input type="number" name="area" min="0" step="0.1" required />
        </label>

        <label>
          Tipo de irrigação:
          <select name="irrigacao">
            <option value="gotejamento">Gotejamento</option>
            <option value="aspersao">Aspersão</option>
            <option value="inundacao">Inundação</option>
          </select>
        </label>

        <button type="submit">Calcular</button>
      </form>
      <p id="resultado-calculadora"></p>
    </section>

    <section id="contato">
      <h2>Contato</h2>
      <form id="form-contato">
        <label>
          Nome:
          <input type="text" name="nome" required />
        </label>

        <label>
          E-mail:
          <input type="email" name="email" required />
        </label>

        <label>
          Mensagem:
          <textarea name="mensagem" rows="4" required></textarea>
        </label>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Agronomia Sustentável. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
